name: Simple Test

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Test Java
      run: |
        echo "public class Test { public static void main(String[] args) { System.out.println(\"CI/CD Pipeline Works!\"); } }" > Test.java
        javac Test.java
        java Test
