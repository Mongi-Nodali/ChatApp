name: ChatApp CI

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Download JSON library
      run: wget -O json.jar https://repo1.maven.org/maven2/org/json/json/20210307/json-20210307.jar
    
    - name: List Java files
      run: find src -name "*.java"
    
    - name: Compile
      run: javac -cp "json.jar" src/*.java
    
    - name: Run
      run: java -cp "src:json.jar" ChatApp
